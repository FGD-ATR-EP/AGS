name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Prepare Aetherium Lite Profile
        run: |
          echo "🔄 Swapping to Mobile DNA..."

          # 1. Swap to mobile requirements
          if [ -f requirements-mobile.txt ]; then
            cp requirements-mobile.txt requirements.txt
            echo "✅ Loaded requirements-mobile.txt"
          else
            echo "⚠️ Mobile requirements not found, using default."
          fi

          # 2. Retrieve Buildozer Spec from Legacy Archives
          # Check 'legacy/kivy_specs/buildozer.spec' first (User path), then 'archive/legacy_v1/...' (Found path)
          if [ -f legacy/kivy_specs/buildozer.spec ]; then
            cp legacy/kivy_specs/buildozer.spec ./buildozer.spec
            echo "✅ Retrieved buildozer.spec from legacy/kivy_specs/"
          elif [ -f archive/legacy_v1/kivy_specs/buildozer.spec ]; then
            cp archive/legacy_v1/kivy_specs/buildozer.spec ./buildozer.spec
            echo "✅ Retrieved buildozer.spec from archive/legacy_v1/kivy_specs/"
          else
            echo "❌ buildozer.spec not found in legacy or archive!"
            # We try looking in other common places just in case
            find . -name buildozer.spec
            exit 1
          fi

          # 3. Inject Mobile Requirements into buildozer.spec
          # We update the 'requirements' line to include FastAPI stack
          # We also inject android.api = 33 to ensure modern build tools
          echo "🔧 Injecting mobile requirements into buildozer.spec..."
          sed -i 's/^requirements = .*/requirements = python3,kivy,websockets,httpx,fastapi,uvicorn,pydantic,python-dotenv,plyer,typing-extensions,idna,android/' buildozer.spec

          # Inject API version if not present or commented
          if ! grep -q "^android.api = 33" buildozer.spec; then
             echo "android.api = 33" >> buildozer.spec
             echo "android.ndk_api = 21" >> buildozer.spec
             echo "✅ Injected android.api = 33"
          fi

          # 4. Create Bootstrap main.py (Using printf to avoid heredoc issues)
          echo "🔨 Forging Kivy Bootstrap (main.py)..."

          printf "import os\n" > main.py
          printf "import sys\n" >> main.py
          printf "import threading\n" >> main.py
          printf "import uvicorn\n" >> main.py
          printf "from kivy.app import App\n" >> main.py
          printf "from kivy.uix.label import Label\n\n" >> main.py

          printf "# Add current directory to path so src.backend can be imported\n" >> main.py
          printf "sys.path.append(os.path.dirname(os.path.abspath(__file__)))\n\n" >> main.py

          printf "# Import the backend app\n" >> main.py
          printf "try:\n" >> main.py
          printf "    from src.backend.main import app as fastapi_app\n" >> main.py
          printf "except ImportError as e:\n" >> main.py
          printf "    print(f'CRITICAL ERROR IMPORTING BACKEND: {e}')\n" >> main.py
          printf "    fastapi_app = None\n\n" >> main.py

          printf "class GenesisApp(App):\n" >> main.py
          printf "    def build(self):\n" >> main.py
          printf "        self.server_thread = threading.Thread(target=self.run_server)\n" >> main.py
          printf "        self.server_thread.daemon = True\n" >> main.py
          printf "        self.server_thread.start()\n" >> main.py
          printf "        return Label(text='Aetherium Genesis\\\nMobile Host Active\\\nPort: 8000', halign='center')\n\n" >> main.py

          printf "    def run_server(self):\n" >> main.py
          printf "        if fastapi_app:\n" >> main.py
          printf "            # Bind to 0.0.0.0 so other devices can access\n" >> main.py
          printf "            uvicorn.run(fastapi_app, host='0.0.0.0', port=8000, log_level='info')\n\n" >> main.py

          printf "if __name__ == '__main__':\n" >> main.py
          printf "    GenesisApp().run()\n" >> main.py

          echo "✅ main.py created."

          # 5. Clean up heavy/legacy directories
          rm -rf archive legacy tests
          echo "🧹 Cleaned up heavy/legacy directories."

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action-v2
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aetherium-genesis-apk
          path: bin/*.apk
