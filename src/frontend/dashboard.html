<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIUM SYNDICATE INSPECTRA | OPERATIONAL DASHBOARD</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-deep: #020617;
            --bg-glass: rgba(15, 23, 42, 0.7);
            --accent-cyan: #06b6d4;
            --accent-purple: #a855f7;
            --accent-gold: #f59e0b;
            --text-glow: 0 0 10px rgba(6, 182, 212, 0.5);
            --border-glass: rgba(255, 255, 255, 0.1);
            --risk-low: #10b981;
            --risk-med: #f59e0b;
            --risk-high: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-deep);
            color: #f1f5f9;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #gun-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.6;
        }

        /* Top Header */
        header {
            height: 60px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--accent-cyan);
            text-shadow: var(--text-glow);
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
        }

        /* Layout */
        main {
            display: grid;
            grid-template-columns: 350px 1fr 400px;
            height: calc(100vh - 60px);
            gap: 1rem;
            padding: 1rem;
        }

        .panel {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--accent-cyan);
        }

        /* Approval Inbox */
        #approval-inbox {
            overflow-y: auto;
            padding: 1rem;
        }

        .approval-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: 0.3s;
        }

        .approval-item:hover {
            border-color: var(--accent-cyan);
        }

        .tier-tag {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .tier-0 { background: var(--risk-low); color: #fff; }
        .tier-1 { background: var(--risk-low); color: #fff; }
        .tier-2 { background: var(--risk-med); color: #fff; }
        .tier-3 { background: var(--risk-high); color: #fff; }

        .approval-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        button {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            transition: 0.2s;
        }

        .btn-approve { background: var(--accent-cyan); color: var(--bg-deep); }
        .btn-reject { background: transparent; border: 1px solid var(--risk-high); color: var(--risk-high); }
        .btn-view { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* Action Preview */
        #action-preview {
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }

        .diff-view {
            background: #000;
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid var(--accent-gold);
            margin-top: 1rem;
        }

        /* Neural Chat */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .user { align-self: flex-end; background: var(--accent-purple); color: #fff; }
        .ai { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border-glass);
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
        }

        /* Gems & Identity */
        #gem-list { padding: 1rem; }
        .gem-card {
            border-left: 2px solid var(--accent-cyan);
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }
        .gem-title { color: var(--accent-cyan); font-weight: 700; margin-bottom: 0.3rem; }
        .gem-principle { font-size: 0.8rem; font-style: italic; opacity: 0.8; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 10px; }
    </style>
</head>
<body>
    <canvas id="gun-canvas"></canvas>

    <header>
        <div class="logo">AETHERIUM SYNDICATE INSPECTRA</div>
        <div style="display:flex; align-items:center; gap:0.75rem;">
            <a href="/verification_suite.html" style="font-size:0.75rem; letter-spacing:1px; color: var(--accent-cyan); text-decoration:none; border:1px solid var(--border-glass); padding:6px 10px; border-radius:999px;">VERIFICATION SUITE</a>
            <a href="/vessel_hub.html" style="font-size:0.75rem; letter-spacing:1px; color: #f59e0b; text-decoration:none; border:1px solid var(--border-glass); padding:6px 10px; border-radius:999px;">VESSEL HUB</a>
            <div class="status-badge" id="system-status">NEURAL LINK: ACTIVE</div>
        </div>
    </header>

    <main>
        <!-- Left: Governance & Approvals -->
        <section class="panel">
            <div class="panel-header">
                <span>APPROVAL INBOX</span>
                <span id="pending-count">0 PENDING</span>
            </div>
            <div id="approval-inbox">
                <!-- Approval items injected here -->
                <div style="text-align: center; opacity: 0.5; margin-top: 2rem;">No pending approvals.</div>
            </div>
        </section>

        <!-- Center: Cognitive Uplink -->
        <section class="panel">
            <div class="panel-header">NEURAL UPLINK</div>
            <div id="chat-history"></div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Transmit intent...">
                <button class="btn-approve" onclick="neuralChat.send()">TRANSMIT</button>
            </div>
        </section>

        <!-- Right: Memory & Gems -->
        <section class="panel">
            <div class="panel-header">GEMS OF WISDOM</div>
            <div id="gem-list">
                <!-- Gems injected here -->
                <div class="gem-card">
                    <div class="gem-title">Principle: Continuity</div>
                    <div class="gem-principle">"Identity persists across all recursive loops."</div>
                </div>
            </div>

            <div class="panel-header" style="border-top: 1px solid var(--border-glass);">ACTION PREVIEW</div>
            <div id="action-preview">
                <div style="opacity: 0.5;">Select a pending action to preview impact.</div>
            </div>
        </section>
    </main>

    <script type="module" src="/public/dashboard/main.js"></script>
    <script>
        class NeuralChat {
            constructor() {
                this.history = document.getElementById('chat-history');
                this.input = document.getElementById('user-input');
                this.ws = null;
                this.connect();

                this.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.send();
                });
            }

            connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                this.ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

                this.ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    this.handleMessage(data);
                };

                this.ws.onclose = () => {
                    setTimeout(() => this.connect(), 2000);
                };
            }

            send() {
                const text = this.input.value.trim();
                if (!text) return;

                this.appendMessage('user', text);
                this.ws.send(JSON.stringify({
                    mode: "logenesis",
                    input: { text: text, session_id: "dashboard" }
                }));
                this.input.value = '';
            }

            appendMessage(role, text) {
                const bubble = document.createElement('div');
                bubble.className = `chat-bubble ${role}`;
                bubble.innerHTML = marked.parse(text);
                this.history.appendChild(bubble);
                this.history.scrollTop = this.history.scrollHeight;
            }

            handleMessage(msg) {
                if (msg.text_content) {
                    this.appendMessage('ai', msg.text_content);
                }
                if (msg.type === "APPROVAL_REQUIRED" && window.governanceManager) {
                    window.governanceManager.fetchApprovals();
                }
            }
        }

        // --- BACKGROUND EFFECTS ---
        const canvas = document.getElementById('gun-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = Array.from({length: 100}, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2
            }));
        }

        function draw() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.1)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#06b6d4';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw();

        const neuralChat = new NeuralChat();
    </script>
</body>
</html>
